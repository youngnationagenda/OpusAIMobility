name: "Deploy — OpusAIMobility Unified CI/CD"
# TICKET: TERRA-093 — Unified monorepo pipeline
# All source is inside omniride/ (NOT opusaimobility/)
# Android app is at omniride/apps/customer/
# Lambda code is at omniride/aws/lambda/ and aws/lambda/ (infra)

on:
  push:
    branches: [main, staging]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip OpusAIMobility frontend deploy'
        required: false
        default: 'false'
        type: boolean
      skip_lambda:
        description: 'Skip Lambda deploys'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 0 — Validate required secrets exist
  # ─────────────────────────────────────────────────────────────────────────
  validate-secrets:
    name: "Validate Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="$MISSING AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Set these in Settings > Secrets > Actions"
            exit 1
          fi
          echo "All required base secrets present"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Detect what changed (path-based triggering)
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: "Detect Changed Paths"
    runs-on: ubuntu-latest
    needs: validate-secrets
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      lambda: ${{ steps.filter.outputs.lambda }}
      push_lambda: ${{ steps.filter.outputs.push_lambda }}
      infra_lambda: ${{ steps.filter.outputs.infra_lambda }}
      android: ${{ steps.filter.outputs.android }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'omniride/src/**'
              - 'omniride/public/**'
              - 'omniride/vite.config.ts'
              - 'omniride/tsconfig.json'
            lambda:
              - 'omniride/aws/lambda/index.js'
              - 'omniride/aws/lambda/package.json'
              - 'omniride/aws/lambda/package-lock.json'
            push_lambda:
              - 'omniride/aws/lambda/push-notification/**'
            infra_lambda:
              - 'aws/lambda/**'
            android:
              - 'omniride/apps/customer/**'
            shared:
              - 'omniride/packages/**'
              - 'omniride/package.json'
              - 'omniride/package-lock.json'

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — CI: TypeScript + Build (OpusAIMobility PWA)
  # ─────────────────────────────────────────────────────────────────────────
  ci-frontend:
    name: "TypeCheck + Build Frontend"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: omniride
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: omniride/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build frontend (Vite)
        env:
          VITE_API_BASE_URL: https://d22up4o3zhu9gf.cloudfront.net
          VITE_AWS_REGION: us-east-1
          VITE_COGNITO_USER_POOL_ID: us-east-1_LKa4ElQem
          VITE_COGNITO_CLIENT_ID: 3a207uin5o3p4k1ngk334crntl
          VITE_S3_BUCKET: ${{ secrets.VITE_S3_BUCKET }}
          VITE_S3_BASE_URL: ${{ secrets.VITE_S3_BASE_URL }}
          VITE_IOT_ENDPOINT: wss://arqymixni12gc-ats.iot.us-east-1.amazonaws.com/mqtt
          VITE_SNS_TOPIC_ARN: arn:aws:sns:us-east-1:683541453923:opusaimobility-notifications
          VITE_PINPOINT_APP_ID: 20d7e36cc4094a04b63b7fd1e5596fcf
          VITE_PUSH_NOTIFICATION_LAMBDA: opusaimobility-push-notification
          VITE_WS_ENDPOINT: wss://z4sof7ojdf.execute-api.us-east-1.amazonaws.com/prod
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: opusaimobility-dist-${{ github.sha }}
          path: omniride/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Run Tests (vitest + fast-check)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.lambda == 'true' ||
      needs.changes.outputs.push_lambda == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: omniride
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: omniride/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy OpusAIMobility Lambda (omniride/aws/lambda/)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-lambda:
    name: "Deploy omniride-api Lambda (Main API)"
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.lambda == 'true' || needs.changes.outputs.shared == 'true') &&
      github.event.inputs.skip_lambda != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: omniride/aws/lambda/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lambda dependencies
        working-directory: omniride/aws/lambda
        run: npm ci --omit=dev

      - name: Zip Lambda
        working-directory: omniride/aws/lambda
        run: zip -r ../lambda-deploy.zip . --exclude "*.test.js" --exclude "*.md" --exclude "node_modules/.cache/*"

      - name: Snapshot current live alias
        id: snapshot
        run: |
          VER=$(aws lambda get-alias --function-name omniride-api --name live \
            --query FunctionVersion --output text 2>/dev/null || echo "NONE")
          echo "prev_version=$VER" >> $GITHUB_OUTPUT

      - name: Deploy omniride-api
        id: deploy
        run: |
          aws lambda update-function-code \
            --function-name omniride-api \
            --zip-file fileb://omniride/aws/lambda-deploy.zip \
            --no-cli-pager
          aws lambda wait function-updated --function-name omniride-api
          NEW_VER=$(aws lambda publish-version \
            --function-name omniride-api \
            --description "Deploy SHA ${{ github.sha }}" \
            --query Version --output text)
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "Published v$NEW_VER"

      - name: Smoke test new version
        id: smoke
        run: |
          aws lambda invoke \
            --function-name omniride-api \
            --qualifier ${{ steps.deploy.outputs.new_version }} \
            --payload '{"httpMethod":"GET","rawPath":"/health","path":"/health","headers":{},"body":"{}"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke.json 2>&1
          STATUS=$(node -e "try{const d=require('/tmp/smoke.json');console.log(d.statusCode||200)}catch{console.log('ERR')}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Smoke status: $STATUS"
          [ "$STATUS" = "200" ] && echo "passed=true" >> $GITHUB_OUTPUT || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Promote live alias
        if: steps.smoke.outputs.passed == 'true'
        run: |
          aws lambda create-alias --function-name omniride-api \
            --name live --function-version ${{ steps.deploy.outputs.new_version }} \
            2>/dev/null || \
          aws lambda update-alias --function-name omniride-api \
            --name live --function-version ${{ steps.deploy.outputs.new_version }}
          echo "live -> v${{ steps.deploy.outputs.new_version }}"

      - name: Rollback on smoke failure
        if: steps.smoke.outputs.passed == 'false'
        run: |
          PREV="${{ steps.snapshot.outputs.prev_version }}"
          if [ "$PREV" != "NONE" ] && [ -n "$PREV" ]; then
            aws lambda update-alias --function-name omniride-api --name live --function-version "$PREV"
            echo "Rolled back to v$PREV"
          fi
          exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Deploy Push Notification Lambda
  # ─────────────────────────────────────────────────────────────────────────
  deploy-push-lambda:
    name: "Deploy Push Notification Lambda"
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.push_lambda == 'true' || needs.changes.outputs.shared == 'true') &&
      github.event.inputs.skip_lambda != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: omniride/aws/lambda/push-notification/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        working-directory: omniride/aws/lambda/push-notification
        run: npm ci --omit=dev

      - name: Package and deploy Push Lambda
        working-directory: omniride/aws/lambda/push-notification
        run: |
          zip -r push-lambda.zip . \
            -x "node_modules/.cache/*" \
            -x "*-service-account.json"
          aws lambda update-function-code \
            --function-name opusaimobility-push-notification \
            --zip-file fileb://push-lambda.zip \
            --region ${{ env.AWS_REGION }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 6 — Deploy Infra Lambdas (telemetry, defi, celo)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-infra-lambdas:
    name: "Deploy Infra Lambdas"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' &&
      needs.changes.outputs.infra_lambda == 'true' &&
      github.event.inputs.skip_lambda != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy telemetry-ingest
        run: |
          cd aws/lambda/telemetry-ingest && npm install --omit=dev && cd ..
          zip -r telemetry-ingest-deploy.zip telemetry-ingest/
          aws lambda update-function-code --function-name terraai-telemetry-ingest \
            --zip-file fileb://aws/lambda/telemetry-ingest-deploy.zip --no-cli-pager
          aws lambda wait function-updated --function-name terraai-telemetry-ingest
          echo "telemetry-ingest updated"

      - name: Deploy defi-settlement
        run: |
          cd aws/lambda/defi-settlement && npm install --omit=dev && cd ..
          zip -r defi-settlement-deploy.zip defi-settlement/
          aws lambda update-function-code --function-name terraai-defi-settlement \
            --zip-file fileb://aws/lambda/defi-settlement-deploy.zip --no-cli-pager
          aws lambda wait function-updated --function-name terraai-defi-settlement
          echo "defi-settlement updated"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 7 — Deploy Frontend to S3 + CloudFront
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy Frontend to S3"
    runs-on: ubuntu-latest
    needs: [changes, ci-frontend]
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true') &&
      github.event.inputs.skip_frontend != 'true'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: opusaimobility-dist-${{ github.sha }}
          path: dist/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/assets/ s3://omniride-assets-prod/assets/ \
            --cache-control "public, max-age=31536000, immutable" --delete
          aws s3 cp dist/index.html s3://omniride-assets-prod/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          # Copy remaining static files
          aws s3 sync dist/ s3://omniride-assets-prod/ \
            --exclude "assets/*" --exclude "index.html" --delete
          echo "Frontend deployed to S3"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "CloudFront cache invalidated"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 8 — Build Signed Release APK (triggers on v* tags)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-customer-release:
    name: "Build & Upload Release APK"
    runs-on: ubuntu-latest
    needs: validate-secrets
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate release secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_FILE }}" ]      && MISSING="$MISSING KEYSTORE_FILE"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]  && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ]          && MISSING="$MISSING KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]       && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing release secrets:$MISSING"
            echo "Set these in Settings > Secrets > Actions before building a release APK"
            exit 1
          fi
          echo "All release secrets present"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p omniride/apps/customer/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > omniride/apps/customer/app/release.keystore

      - name: Build signed release APK
        working-directory: omniride/apps/customer
        env:
          KEYSTORE_PATH: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Verify APK is signed
        run: |
          APK_PATH=$(find omniride/apps/customer/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK_PATH"
          $ANDROID_HOME/build-tools/*/apksigner verify --verbose "$APK_PATH" | grep -E "Verified|v[12] scheme"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload release APK to S3
        run: |
          APK_PATH=$(find omniride/apps/customer/app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          aws s3 cp "$APK_PATH" \
            "s3://opusaimobility-apk-distribution/apks/customer/release/opusaimobility-customer-${VERSION_TAG}.apk"
          aws s3 cp "$APK_PATH" \
            "s3://opusaimobility-apk-distribution/apks/customer/release/latest-release.apk"
          echo "Release APK uploaded: opusaimobility-customer-${VERSION_TAG}.apk"

      - name: Clean up keystore
        if: always()
        run: rm -f omniride/apps/customer/app/release.keystore

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 9 — Post-Deploy Smoke Tests
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "Post-Deploy Smoke Test"
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-push-lambda, deploy-frontend]
    if: always() && github.ref_name == 'main'
    steps:
      - name: Wait for Lambda warmup
        run: sleep 10

      - name: Check /health endpoint (CloudFront)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://d22up4o3zhu9gf.cloudfront.net/health")
          echo "Health check: HTTP $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || { echo "::warning::Health check returned $HTTP_STATUS"; }

      - name: Check Lambda direct
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invoke Lambda health
        run: |
          aws lambda invoke \
            --function-name omniride-api \
            --payload '{"httpMethod":"GET","rawPath":"/health","path":"/health","headers":{},"body":"{}"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/health.json
          cat /tmp/health.json
          echo ""
          echo "Lambda health check complete"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| omniride-api Lambda (Main API) | ${{ needs.deploy-lambda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Push Notification Lambda | ${{ needs.deploy-push-lambda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (S3) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref }}\` |" >> $GITHUB_STEP_SUMMARY
