name: CI Gate (Unified)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"
  AWS_DEPLOY_ROLE: arn:aws:iam::683541453923:role/opusaimobility-github-deploy
  Q_CONNECTION_ARN: arn:aws:codeconnections:us-east-1:683541453923:connection/106cbfc4-0ec6-492a-bf08-43ba86575ea1

jobs:
  # ─── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json
      - name: Install
        working-directory: MobilityAIapp
        run: npm ci
      - name: Type check
        working-directory: MobilityAIapp
        run: npm run type:check

  # ─── Tests ───────────────────────────────────────────────────────────────────
  tests:
    name: Vitest unit + property tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json
      - name: Install
        working-directory: MobilityAIapp
        run: npm ci
      - name: Test
        working-directory: MobilityAIapp
        run: npm test -- --silent

  # ─── Lambda audit ────────────────────────────────────────────────────────────
  lambda-audit:
    name: Lambda dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/backend/lambda/terraaimobility-api/package-lock.json
      - name: Audit
        working-directory: MobilityAIapp/backend/lambda/terraaimobility-api
        run: npm audit --audit-level=high

  # ─── AWS connectivity (PRs to main only) ─────────────────────────────────────
  aws-connectivity:
    name: AWS OIDC + Amazon Q connection
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: ci-aws-check-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify identity
        run: aws sts get-caller-identity --output table
      - name: Verify Amazon Q connection
        run: |
          STATUS=$(aws codestar-connections get-connection \
            --connection-arn "${{ env.Q_CONNECTION_ARN }}" \
            --query "Connection.ConnectionStatus" \
            --output text)
          echo "Amazon Q Connection: $STATUS"
          [ "$STATUS" = "AVAILABLE" ] || { echo "::error::Q Connection not AVAILABLE"; exit 1; }

  # ─── CI Gate ─────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [typecheck, tests, lambda-audit]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]] ||
             [[ "${{ needs.tests.result }}" != "success" ]] ||
             [[ "${{ needs.lambda-audit.result }}" != "success" ]]; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
