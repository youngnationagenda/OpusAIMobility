name: Frontend (React PWA)

on:
  push:
    branches: [main]
    paths:
      - 'MobilityAIapp/frontend/**'
      - 'MobilityAIapp/shared/**'
      - 'MobilityAIapp/package.json'
      - 'MobilityAIapp/package-lock.json'
      - 'MobilityAIapp/vite.config.ts'
      - 'MobilityAIapp/tsconfig.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'MobilityAIapp/frontend/**'
      - 'MobilityAIapp/shared/**'
      - 'MobilityAIapp/package.json'
      - 'MobilityAIapp/vite.config.ts'
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"
  AWS_DEPLOY_ROLE: arn:aws:iam::683541453923:role/opusaimobility-github-deploy

jobs:
  ci:
    name: Type Check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      - name: Install dependencies
        working-directory: MobilityAIapp
        run: npm ci

      - name: TypeScript type check
        working-directory: MobilityAIapp
        run: npm run type:check

      - name: Run tests
        working-directory: MobilityAIapp
        run: npm test -- --silent

  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      - name: Install dependencies
        working-directory: MobilityAIapp
        run: npm ci

      - name: Build (Vite)
        working-directory: MobilityAIapp
        env:
          VITE_API_BASE_URL:              https://opusaimobility.yna.co.ke
          VITE_APP_URL:                   https://app.opusaimobility.yna.co.ke
          VITE_AWS_REGION:               us-east-1
          VITE_COGNITO_USER_POOL_ID:     us-east-1_LKa4ElQem
          VITE_COGNITO_CLIENT_ID:        3a207uin5o3p4k1ngk334crntl
          VITE_S3_BUCKET:                opusaimobility-assets-prod
          VITE_S3_BASE_URL:              https://opusaimobility-assets-prod.s3.us-east-1.amazonaws.com
          VITE_IOT_ENDPOINT:             wss://arqymixni12gc-ats.iot.us-east-1.amazonaws.com/mqtt
          VITE_IOT_STREAM_URL_ENDPOINT:  /iot/stream-url
          VITE_SNS_TOPIC_ARN:            arn:aws:sns:us-east-1:683541453923:opusaimobility-notifications
          VITE_PINPOINT_APP_ID:          20d7e36cc4094a04b63b7fd1e5596fcf
          VITE_PUSH_NOTIFICATION_LAMBDA: opusaimobility-push-notification
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: frontend-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: MobilityAIapp
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --region ${{ env.AWS_REGION }}
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "CloudFront invalidation: $INVALIDATION_ID"
          echo "Live: https://app.opusaimobility.yna.co.ke"
