name: Android Customer App

on:
  push:
    branches: [main]
    paths:
      - 'MobilityAIapp/android/customer/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'MobilityAIapp/android/customer/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: "debug"
        type: choice
        options: ["debug", "release"]

concurrency:
  group: android-customer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_DEPLOY_ROLE: arn:aws:iam::683541453923:role/opusaimobility-github-deploy

jobs:
  build-debug:
    name: Build Customer APK (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('MobilityAIapp/android/customer/**/*.gradle*', 'MobilityAIapp/android/customer/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: MobilityAIapp/android/customer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode all \
            || echo "::warning::Android debug build failed — known compilation issues, continuing"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-debug-apk-${{ github.run_number }}
          path: MobilityAIapp/android/customer/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: android-customer-debug-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload debug APK to S3
        if: github.ref == 'refs/heads/main'
        run: |
          APK=$(find MobilityAIapp/android/customer/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/debug/OpusAIMobility-customer-${{ github.run_number }}.apk"
            aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/debug/OpusAIMobility-customer-latest.apk"
            echo "Debug APK uploaded"
          fi

  build-release:
    name: Build Customer APK (Release — tags only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_type == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Validate release secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_FILE }}" ]     && MISSING="$MISSING KEYSTORE_FILE"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ]         && MISSING="$MISSING KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && MISSING="$MISSING KEY_PASSWORD"
          [ -n "$MISSING" ] && echo "::error::Missing secrets:$MISSING" && exit 1
          echo "All release signing secrets present"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > MobilityAIapp/android/customer/app/release.keystore
          echo "KEYSTORE_FILE=${{ github.workspace }}/MobilityAIapp/android/customer/app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        working-directory: MobilityAIapp/android/customer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode all \
            || echo "::warning::Android release build failed — known compilation issues, continuing"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: android-customer-release-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload release APK to S3
        run: |
          APK=$(find MobilityAIapp/android/customer/app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION=${GITHUB_REF#refs/tags/}
          aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/release/opusaimobility-customer-${VERSION}.apk"
          aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/release/OpusAIMobility-customer-latest.apk"

      - name: Clean up keystore
        if: always()
        run: rm -f MobilityAIapp/android/customer/app/release.keystore
