# ═══════════════════════════════════════════════════════════════════════════════
# OpusAIMobility — CodeQL Security Analysis
#
# Analyses all source languages in the monorepo:
#   • java-kotlin           — Android app (230 Java files, compiled via Gradle autobuild)
#   • javascript-typescript — Lambda API, React frontend, CI scripts
#   • actions               — GitHub Actions workflow files
#
# Query suite : security-extended (superset of default security-queries)
# Build mode  : autobuild for Java (compiled bytecode = richer analysis)
#               none for JS/TS and actions (source-only)
# Triggers    : push/PR to main (path-filtered), weekly schedule, manual dispatch
# ═══════════════════════════════════════════════════════════════════════════════

name: "CodeQL Security Analysis"

on:
  push:
    branches: ["main"]
    paths:
      - "MobilityAIapp/apps/customer/**/*.java"
      - "MobilityAIapp/apps/customer/**/*.gradle"
      - "MobilityAIapp/src/**"
      - "MobilityAIapp/aws/lambda/**"
      - "MobilityAIapp/server/**"
      - "MobilityAIapp/scripts/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "MobilityAIapp/apps/customer/**/*.java"
      - "MobilityAIapp/apps/customer/**/*.gradle"
      - "MobilityAIapp/src/**"
      - "MobilityAIapp/aws/lambda/**"
      - "MobilityAIapp/server/**"
      - "MobilityAIapp/scripts/**"
      - ".github/workflows/**"
  schedule:
    - cron: "25 13 * * 3"
  workflow_dispatch:
    inputs:
      language:
        description: "Language to scan (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - java-kotlin
          - javascript-typescript
          - actions

concurrency:
  group: codeql-${{ github.ref }}-${{ matrix.language }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve language matrix (supports manual single-language dispatch)
  # ─────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build language matrix
        id: build
        run: |
          INPUT="${{ github.event.inputs.language }}"
          if [ -n "$INPUT" ]; then
            echo "matrix={\"include\":[{\"language\":\"$INPUT\"}]}" >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"language":"java-kotlin"},{"language":"javascript-typescript"},{"language":"actions"}]}' >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # CodeQL analysis — one job per language (parallel)
  # ─────────────────────────────────────────────────────────────────────────
  analyze:
    name: "Analyze (${{ matrix.language }})"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      security-events: write  # required: upload SARIF to GitHub Security tab
      packages: read           # required: fetch CodeQL packs from GHCR
      actions: read            # required: read workflow files for actions language
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Runtime setup (language-conditional) ────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle cache
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      # ── Initialize CodeQL ───────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-extended: all security queries + quality queries
          # Catches: SQL injection, XSS, path traversal, weak crypto,
          #          Android intent injection, cleartext storage, etc.
          queries: security-extended
          config-file: .github/codeql/codeql-config.yml
          build-mode: ${{ matrix.language == 'java-kotlin' && 'autobuild' || 'none' }}

      # ── Autobuild (Java: Gradle compiles the Android project) ───────────────
      # CodeQL autobuild detects and runs: ./gradlew assembleDebug
      # Compiled bytecode gives significantly deeper dataflow analysis
      # than source-only scanning.
      # Note: build-mode=autobuild above handles this automatically.
      # The step below is a fallback only if autobuild is disabled.
      - name: Gradle build (manual fallback — disabled by default)
        if: matrix.language == 'java-kotlin' && false
        working-directory: MobilityAIapp/apps/customer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -x test -x lint

      # ── Run analysis ────────────────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
          output: sarif-results

      # ── Preserve SARIF for offline review ───────────────────────────────────
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}-${{ github.sha }}
          path: sarif-results/**/*.sarif
          retention-days: 30
          if-no-files-found: ignore

      # ── Job summary ──────────────────────────────────────────────────────────
      - name: Write step summary
        if: always()
        run: |
          echo "## CodeQL — \`${{ matrix.language }}\`" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Query suite | \`security-extended\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build mode | \`${{ matrix.language == 'java-kotlin' && 'autobuild' || 'none' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Results | [Security tab ↗](https://github.com/${{ github.repository }}/security/code-scanning) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Gate: all language analyses must pass
  # ─────────────────────────────────────────────────────────────────────────
  codeql-complete:
    name: "CodeQL Complete"
    needs: analyze
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all analyses passed
        run: |
          if [ "${{ needs.analyze.result }}" = "failure" ]; then
            echo "::error::One or more CodeQL analyses failed."
            exit 1
          fi
          echo "All CodeQL analyses completed. Check the Security tab for findings."
