# ═══════════════════════════════════════════════════════════════════════════════
# OpusAIMobility — CI/CD Pipeline
# Builds Android APK v1.7, deploys Lambdas and Frontend to AWS
# ═══════════════════════════════════════════════════════════════════════════════
#
# REQUIRED GITHUB SECRETS:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   S3_APK_BUCKET          — e.g. opusaimobility-apk-distribution
#   S3_FRONTEND_BUCKET     — e.g. opusaimobility-frontend
#   CLOUDFRONT_DISTRIBUTION_ID
#   KEYSTORE_FILE          — base64-encoded release keystore (for release builds)
#   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
# ═══════════════════════════════════════════════════════════════════════════════
#
name: "OpusAIMobility CI/CD"

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Detect what changed
  # ─────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      lambda_main: ${{ steps.filter.outputs.lambda_main }}
      lambda_push: ${{ steps.filter.outputs.lambda_push }}
      lambda_infra: ${{ steps.filter.outputs.lambda_infra }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'MobilityAIapp/apps/customer/**'
            lambda_main:
              - 'MobilityAIapp/aws/lambda/index.js'
              - 'MobilityAIapp/aws/lambda/package.json'
              - 'MobilityAIapp/aws/lambda/package-lock.json'
            lambda_push:
              - 'MobilityAIapp/aws/lambda/push-notification/**'
            lambda_infra:
              - 'aws/lambda/**'
            frontend:
              - 'MobilityAIapp/src/**'
              - 'MobilityAIapp/public/**'
              - 'MobilityAIapp/package.json'
              - 'MobilityAIapp/vite.config.ts'

  # ─────────────────────────────────────────────────────────────────────
  # Android Debug APK Build
  # ─────────────────────────────────────────────────────────────────────
  build-android-debug:
    name: "Build Android APK (Debug)"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.android == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Make gradlew executable
        run: chmod +x MobilityAIapp/apps/customer/gradlew

      - name: Build with Gradle
        working-directory: MobilityAIapp/apps/customer
        run: ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: opusaimobility-debug-${{ github.sha }}
          path: MobilityAIapp/apps/customer/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # Android Release APK (v1.7) — on tags or manual dispatch
  # ─────────────────────────────────────────────────────────────────────
  build-android-release:
    name: "Build & Deploy Release APK v1.7"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Validate release secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_FILE }}" ]     && MISSING="$MISSING KEYSTORE_FILE"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ]         && MISSING="$MISSING KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing release secrets:$MISSING — building unsigned"
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Make gradlew executable
        run: chmod +x MobilityAIapp/apps/customer/gradlew

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_FILE }}" ]; then
            echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > MobilityAIapp/apps/customer/app/release.keystore
            echo "KEYSTORE_FILE=$(pwd)/MobilityAIapp/apps/customer/app/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "Keystore decoded successfully"
          else
            echo "No KEYSTORE_FILE secret — building with debug signing"
          fi

      - name: Build release APK
        working-directory: MobilityAIapp/apps/customer
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: opusaimobility-release-${{ github.sha }}
          path: MobilityAIapp/apps/customer/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload release APK to S3
        continue-on-error: true
        run: |
          APK=$(find MobilityAIapp/apps/customer/app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION="${GITHUB_REF_NAME:-v1.7.0}"
          aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/OpusAIMobility-${VERSION}.apk"
          aws s3 cp "$APK" "s3://${{ secrets.S3_APK_BUCKET }}/apks/OpusAIMobility-latest.apk"
          echo "### APK Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- S3: s3://${{ secrets.S3_APK_BUCKET }}/apks/OpusAIMobility-${VERSION}.apk" >> $GITHUB_STEP_SUMMARY

      - name: Clean up keystore
        if: always()
        run: rm -f MobilityAIapp/apps/customer/app/release.keystore

  # ─────────────────────────────────────────────────────────────────────
  # Deploy Main API Lambda (skipped until AWS secrets configured)
  # ─────────────────────────────────────────────────────────────────────
  deploy-lambda-main:
    name: "Deploy Main API Lambda"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' &&
      needs.changes.outputs.lambda_main == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: MobilityAIapp/aws/lambda
        run: npm ci --omit=dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy
        working-directory: MobilityAIapp/aws/lambda
        run: |
          zip -r lambda.zip . -x "node_modules/.cache/*" -x "*.test.*"
          aws lambda update-function-code \
            --function-name omniride-api \
            --zip-file fileb://lambda.zip
          echo "### Lambda Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Function: omniride-api" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Deploy Push Notification Lambda (skipped until AWS secrets configured)
  # ─────────────────────────────────────────────────────────────────────
  deploy-lambda-push:
    name: "Deploy Push Notification Lambda"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' &&
      needs.changes.outputs.lambda_push == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: MobilityAIapp/aws/lambda/push-notification
        run: npm ci --omit=dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy
        working-directory: MobilityAIapp/aws/lambda/push-notification
        run: |
          zip -r push-lambda.zip . -x "node_modules/.cache/*"
          aws lambda update-function-code \
            --function-name opusaimobility-push-notification \
            --zip-file fileb://push-lambda.zip
          echo "### Push Lambda Deployed" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Deploy Frontend to S3 + CloudFront (skipped until S3 bucket exists)
  # ─────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "Build & Deploy Frontend"
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' &&
      needs.changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      - name: Install dependencies
        working-directory: MobilityAIapp
        run: npm ci

      - name: Build
        working-directory: MobilityAIapp
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: MobilityAIapp
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "### Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront invalidation triggered" >> $GITHUB_STEP_SUMMARY
- name: Cache
  uses: actions/cache@v5.1.0
  with:
    # A list of files, directories, and wildcard patterns to cache and restore
    path: 
    # An explicit key for restoring and saving the cache
    key: 
    # An ordered multiline string listing the prefix-matched keys, that are used for restoring stale cache if no cache hit occurred for key. Note `cache-hit` returns false in this case.
    restore-keys: # optional
    # The chunk size used to split up large files during upload, in bytes
    upload-chunk-size: # optional
    # An optional boolean when enabled, allows windows runners to save or restore caches that can be restored or saved respectively on other platforms
    enableCrossOsArchive: # optional, default is false
    # Fail the workflow if cache entry is not found
    fail-on-cache-miss: # optional, default is false
    # Check if a cache entry exists for the given input(s) (key, restore-keys) without downloading the cache
    lookup-only: # optional, default is false
    # Run the post step to save the cache even if another step before fails
    save-always: # optional, default is false
- name: Setup Node.js environment
  uses: actions/setup-node@v6.4.0
  with:
    # Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.
    node-version: # optional
    # File containing the version Spec of the version to use.  Examples: package.json, .nvmrc, .node-version, .tool-versions.
    node-version-file: # optional
    # Target architecture for Node to use. Examples: x86, x64. Will use system architecture by default.
    architecture: # optional
    # Set this option if you want the action to check for the latest available version that satisfies the version spec.
    check-latest: # optional
    # Optional registry to set up for auth. Will set the registry in a project level .npmrc and .yarnrc file, and set up auth to read in from env.NODE_AUTH_TOKEN.
    registry-url: # optional
    # Optional scope for authenticating against scoped registries. Will fall back to the repository owner when using the GitHub Packages registry (https://npm.pkg.github.com/).
    scope: # optional
    # Used to pull node distributions from node-versions. Since there's a default, this is typically not supplied by the user. When running this action on github.com, the default value is sufficient. When running on GHES, you can pass a personal access token for github.com if you are experiencing rate limiting.
    token: # optional, default is ${{ github.server_url == 'https://github.com' && github.token || '' }}
    # Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm.
    cache: # optional
    # Set to false to disable automatic caching. By default, caching is enabled when either devEngines.packageManager or the top-level packageManager field in package.json specifies npm as the package manager.
    package-manager-cache: # optional, default is true
    # Used to specify the path to a dependency file: package-lock.json, yarn.lock, etc. Supports wildcards or a list of file names for caching multiple dependencies.
    cache-dependency-path: # optional
    # Used to specify an alternative mirror to download Node.js binaries from
    mirror: # optional
    # The token used as Authorization header when fetching from the mirror
    mirror-token: # optional
