# ─────────────────────────────────────────────────────────────────────────────
# OmniRide CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   push → main          Full deploy  (build frontend + deploy Lambda + upload S3)
#   push → staging        Staging deploy (same pipeline, different S3 prefix)
#   pull_request → main   CI only      (type-check + build, no deploy)
#   workflow_dispatch     Manual run with optional skip flags
#
# Jobs:
#   1. ci          → Install, type-check, build (all branches)
#   2. deploy-lambda → Zip + update Lambda function code  (main/staging only)
#   3. deploy-frontend → Upload dist/ to S3 (main/staging only)
#   4. smoke-test  → Hit the live API Gateway to confirm Lambda is healthy
#   5. notify      → Post deployment summary as a commit status
#
# Secrets required (set in repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         IAM key for omniride-github-actions user
#   AWS_SECRET_ACCESS_KEY     IAM secret for omniride-github-actions user
#   AWS_REGION                us-east-1
#   VITE_API_BASE_URL         https://0wv2nyk3je.execute-api.us-east-1.amazonaws.com/prod
#   VITE_AWS_REGION           us-east-1
#   VITE_COGNITO_USER_POOL_ID us-east-1_3lWqQNDwm
#   VITE_COGNITO_CLIENT_ID    6o0bfotnaeaqq40idq6ukhrb8e
#   VITE_S3_BUCKET            omniride-assets-prod
#   VITE_S3_BASE_URL          https://omniride-assets-prod.s3.us-east-1.amazonaws.com
#   VITE_IOT_ENDPOINT         wss://arqymixni12gc-ats.iot.us-east-1.amazonaws.com/mqtt
#   VITE_SNS_TOPIC_ARN        arn:aws:sns:us-east-1:683541453923:omniride-notifications
# ─────────────────────────────────────────────────────────────────────────────

name: OmniRide CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend S3 deploy'
        required: false
        default: 'false'
        type: boolean
      skip_lambda:
        description: 'Skip Lambda deploy'
        required: false
        default: 'false'
        type: boolean

# Cancel any in-progress run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  LAMBDA_FUNCTION_NAME: omniride-api
  S3_BUCKET: ${{ secrets.VITE_S3_BUCKET }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — CI: Install → Type-check → Build
  # Runs on every push and every PR
  # ───────────────────────────────────────────────────────────────────────────
  ci:
    name: 🔍 Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install frontend dependencies
        run: npm ci

      - name: 🔎 TypeScript type-check
        run: npm run type:check

      - name: 🏗️ Build frontend (Vite)
        env:
          VITE_API_BASE_URL:          ${{ secrets.VITE_API_BASE_URL }}
          VITE_AWS_REGION:            ${{ secrets.VITE_AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID:  ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID:     ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_S3_BUCKET:             ${{ secrets.VITE_S3_BUCKET }}
          VITE_S3_BASE_URL:           ${{ secrets.VITE_S3_BASE_URL }}
          VITE_IOT_ENDPOINT:          ${{ secrets.VITE_IOT_ENDPOINT }}
          VITE_SNS_TOPIC_ARN:         ${{ secrets.VITE_SNS_TOPIC_ARN }}
        run: npm run build

      - name: 📊 Report bundle sizes
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/*.js 2>/dev/null | sort -hr | while IFS= read -r line; do
            size=$(echo "$line" | awk '{print $1}')
            file=$(echo "$line" | awk '{print $2}' | xargs basename)
            echo "| \`$file\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(du -sh dist/ | awk '{print $1}')
          echo "**Total dist size: $total**" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniride-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy Lambda
  # Only runs on push to main or staging (not on PRs)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-lambda:
    name: 🚀 Deploy Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: |
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_lambda != 'true'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aws/lambda/package-lock.json

      - name: 📦 Install Lambda dependencies
        working-directory: aws/lambda
        run: npm ci --omit=dev

      - name: 🗜️ Zip Lambda package
        working-directory: aws/lambda
        run: |
          zip -r ../lambda-deploy.zip . \
            --exclude "*.test.js" \
            --exclude "*.md" \
            --exclude ".git*"
          echo "Lambda package size: $(du -sh ../lambda-deploy.zip | awk '{print $1}')"

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🚀 Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://aws/lambda-deploy.zip \
            --region ${{ env.AWS_REGION }} \
            --output json | jq '{FunctionName,CodeSize,LastModified,State}'

      - name: ⏳ Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda update confirmed active"

      - name: 🏷️ Publish Lambda version & update alias
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --description "Deployed from GitHub SHA ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Version' \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published Lambda version: $VERSION"

          # Create/update 'live' alias pointing to latest version
          aws lambda create-alias \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --name live \
            --function-version $VERSION \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --name live \
            --function-version $VERSION \
            --region ${{ env.AWS_REGION }}

          echo "✅ Alias 'live' → version $VERSION"

      - name: 📝 Lambda deploy summary
        run: |
          echo "## ⚡ Lambda Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function | \`${{ env.LAMBDA_FUNCTION_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.publish.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Alias | \`live\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy Frontend to S3
  # Only runs on push to main or staging (not on PRs)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → S3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: |
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_frontend != 'true'

    steps:
      - name: ⬇️ Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: omniride-dist-${{ github.sha }}
          path: dist/

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: 🌐 Sync dist/ to S3 (main branch → root)
        if: github.ref_name == 'main'
        run: |
          # Upload JS/CSS with long cache (content-hashed filenames)
          aws s3 sync dist/assets/ s3://${{ env.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --region ${{ env.AWS_REGION }}

          # Upload HTML with no-cache (always re-fetch)
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Frontend synced to s3://${{ env.S3_BUCKET }}/"

      - name: 🌐 Sync dist/ to S3 (staging branch → /staging prefix)
        if: github.ref_name == 'staging'
        run: |
          aws s3 sync dist/assets/ s3://${{ env.S3_BUCKET }}/staging/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --region ${{ env.AWS_REGION }}

          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/staging/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Staging frontend synced to s3://${{ env.S3_BUCKET }}/staging/"

      - name: 📝 S3 deploy summary
        run: |
          echo "## 🌐 Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`${{ env.S3_BUCKET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | \`${{ secrets.VITE_S3_BASE_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Smoke Test
  # Hits the live API Gateway after both Lambda + Frontend are deployed
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test (Live API)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-lambda, deploy-frontend]
    if: github.ref_name == 'main'

    steps:
      - name: ⏳ Wait 10s for Lambda to warm up
        run: sleep 10

      - name: 🏥 Health check — Platform Settings
        id: health_settings
        run: |
          RESPONSE=$(curl -sf \
            "${{ secrets.VITE_API_BASE_URL }}/platform/settings" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}" 2>&1)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Body: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ /platform/settings → $HTTP_STATUS"

      - name: 🏥 Health check — Rides Pricing
        id: health_pricing
        run: |
          RESPONSE=$(curl -sf \
            "${{ secrets.VITE_API_BASE_URL }}/rides/pricing" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}" 2>&1)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Pricing check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ /rides/pricing → $HTTP_STATUS"

      - name: 🏥 Health check — CORS preflight
        id: health_cors
        run: |
          RESPONSE=$(curl -sf -X OPTIONS \
            "${{ secrets.VITE_API_BASE_URL }}/auth/signin" \
            -H "Origin: https://omniride.app" \
            -H "Access-Control-Request-Method: POST" \
            -w "\nHTTP_STATUS:%{http_code}" 2>&1)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Status: $HTTP_STATUS"
          echo "✅ CORS preflight → $HTTP_STATUS"

      - name: 📝 Smoke test summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`GET /platform/settings\` | ${{ steps.health_settings.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`GET /rides/pricing\` | ${{ steps.health_pricing.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`OPTIONS /auth/signin\` (CORS) | ${{ steps.health_cors.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API Gateway:** ${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_STEP_SUMMARY
