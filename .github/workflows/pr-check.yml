# PR Check Workflow - Gate on pull requests to main
#
# Runs type-check, lint, and tests for affected components only.
# Uses path-based filtering consistent with deploy.yml so PRs only
# validate what they change.
#
# All checks must pass before merge (branch protection targets `pr-ready` job).
#
# Requirements: 11.3, 11.5
#
# DEPRECATED: Do not add checks for aimobility-push Lambda (CF-4, retired)

name: PR Check

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # -------------------------------------------------------------------
  # Detect which paths changed
  # -------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      customer_app: ${{ steps.filter.outputs.customer_app }}
      lambda: ${{ steps.filter.outputs.lambda }}
      push_lambda: ${{ steps.filter.outputs.push_lambda }}
      terra_api: ${{ steps.filter.outputs.terra_api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            customer_app:
              - 'apps/customer/**'
            lambda:
              - 'aws/lambda/index.js'
              - 'aws/lambda/package.json'
              - 'aws/lambda/package-lock.json'
            push_lambda:
              - 'aws/lambda/push-notification/**'
            terra_api:
              - 'infra/docker/terra-api/**'
              - 'apps/terra-api/**'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.*'
            shared:
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
            infra:
              - 'infra/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/ci/**'

  # -------------------------------------------------------------------
  # TypeScript type check (only if TS files changed)
  # -------------------------------------------------------------------
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.lambda == 'true' ||
      needs.changes.outputs.push_lambda == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.shared == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # -------------------------------------------------------------------
  # Lint (only if source code changed)
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.lambda == 'true' ||
      needs.changes.outputs.push_lambda == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.terra_api == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present || echo "No lint script found, skipping"

  # -------------------------------------------------------------------
  # Tests - runs vitest for relevant test suites based on changed paths
  # -------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: changes
    # Run tests if any code or test files changed
    if: >-
      needs.changes.outputs.lambda == 'true' ||
      needs.changes.outputs.push_lambda == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.terra_api == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  # -------------------------------------------------------------------
  # Android build check (only if customer app changed)
  # -------------------------------------------------------------------
  android-build-check:
    name: Android Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.customer_app == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android build
        working-directory: apps/customer
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleDebug --dry-run

  # -------------------------------------------------------------------
  # Infrastructure validation (only if infra files changed)
  # -------------------------------------------------------------------
  infra-check:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON configs
        run: |
          echo "Validating infrastructure JSON files..."
          FAILED=0
          for f in $(find infra/ -name "*.json" -type f); do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in $f"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "All infrastructure JSON files are valid"

  # -------------------------------------------------------------------
  # Summary job — branch protection targets this job name
  # -------------------------------------------------------------------
  pr-ready:
    name: PR Ready
    runs-on: ubuntu-latest
    needs: [changes, type-check, lint, test, android-build-check, infra-check]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          FAILED=0

          # Type check (only required if it ran)
          if [ "${{ needs.type-check.result }}" = "failure" ]; then
            echo "| Type Check | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          elif [ "${{ needs.type-check.result }}" = "success" ]; then
            echo "| Type Check | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Type Check | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Lint (only required if it ran)
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "| Lint | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          elif [ "${{ needs.lint.result }}" = "success" ]; then
            echo "| Lint | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Lint | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Tests (only required if they ran)
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "| Tests | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          elif [ "${{ needs.test.result }}" = "success" ]; then
            echo "| Tests | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Tests | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android (only required if it ran)
          if [ "${{ needs.android-build-check.result }}" = "failure" ]; then
            echo "| Android Build | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          elif [ "${{ needs.android-build-check.result }}" = "success" ]; then
            echo "| Android Build | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android Build | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # Infra (only required if it ran)
          if [ "${{ needs.infra-check.result }}" = "failure" ]; then
            echo "| Infra Validation | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          elif [ "${{ needs.infra-check.result }}" = "success" ]; then
            echo "| Infra Validation | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Infra Validation | :fast_forward: Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "::error::One or more checks failed. See summary above."
            exit 1
          fi
          echo ""
          echo "All checks passed! PR is ready for review."
