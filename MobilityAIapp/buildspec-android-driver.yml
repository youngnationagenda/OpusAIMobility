# ==============================================================================
# OpusAIMobility — Android Driver App Build Spec  (v3 — fixed Android SDK path)
#
# Key fix: Android SDK path is written to /tmp/android-sdk-path.txt in INSTALL
# and sourced in BUILD phase to persist across CodeBuild phase boundaries.
# Uses --rerun-tasks to force fresh Gradle compilation.
# ==============================================================================
version: 0.2

env:
  variables:
    DRIVER_APP_DIR: "MobilityAIapp/android/driver"
    S3_APK_BUCKET:  "opusaimobility-apk-distribution"
  secrets-manager:
    KEYSTORE_PASSWORD: "opusaimobility/android-keystore:storePassword"
    KEY_ALIAS:         "opusaimobility/android-keystore:keyAlias"
    KEY_PASSWORD:      "opusaimobility/android-keystore:keyPassword"
    GOOGLE_MAPS_KEY:   "terraai/google-maps:GOOGLE_MAPS_KEY"

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 22
    commands:
      - echo "=== Install Phase ==="
      - java -version

      # ── Android SDK: detect or install, then persist path ─────────────────
      - |
        if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
          SDK="$ANDROID_HOME"
          echo "SDK found at ANDROID_HOME: $SDK"
        elif [ -d "/usr/local/android-sdk" ]; then
          SDK="/usr/local/android-sdk"
          echo "SDK found at /usr/local/android-sdk"
        elif [ -d "$HOME/android-sdk" ]; then
          SDK="$HOME/android-sdk"
          echo "SDK found at HOME: $SDK"
        else
          echo "Installing Android SDK..."
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O clt.zip
          unzip -q clt.zip -d /tmp/clt_extract
          mv /tmp/clt_extract/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          SDK="$HOME/android-sdk"
          export PATH="$PATH:$SDK/cmdline-tools/latest/bin"
          cd "$CODEBUILD_SRC_DIR"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -5 || true
          echo "Android SDK installed at: $SDK"
        fi
        echo "$SDK" > /tmp/android-sdk-path.txt
        echo "ANDROID_SDK_PATH=$SDK"
        echo "sdk.dir=$SDK" > "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/local.properties"

      # ── Keystore ────────────────────────────────────────────────────────────
      - |
        aws secretsmanager get-secret-value \
          --secret-id "opusaimobility/android-keystore" \
          --query "SecretString" --output text --region us-east-1 | \
        node -e "
          const s=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
          require('fs').writeFileSync(
            process.env.CODEBUILD_SRC_DIR+'/'+process.env.DRIVER_APP_DIR+'/app/opusaimobility-driver.jks',
            Buffer.from(s.keystoreBase64,'base64')
          );
          console.log('Keystore decoded:',Buffer.from(s.keystoreBase64,'base64').length,'bytes');
        "

      # ── Google services.json ─────────────────────────────────────────────
      - |
        node -e "
          const fs=require('fs');
          const p=process.env.CODEBUILD_SRC_DIR+'/'+process.env.DRIVER_APP_DIR+'/app/google-services.json';
          try {
            const gsj=JSON.parse(fs.readFileSync(p,'utf8'));
            if(gsj.client&&gsj.client[0]&&gsj.client[0].api_key){
              gsj.client[0].api_key[0].current_key=process.env.GOOGLE_MAPS_KEY||'';
              fs.writeFileSync(p,JSON.stringify(gsj,null,2));
              console.log('Maps key injected');
            }
          } catch(e){console.warn('gsj skipped:',e.message);}
        "

      # ── gradlew permissions ──────────────────────────────────────────────
      - chmod +x "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/gradlew"

  build:
    commands:
      - echo "=== Build Phase ==="
      - |
        # Read persisted SDK path
        SDK=$(cat /tmp/android-sdk-path.txt 2>/dev/null || echo "$HOME/android-sdk")
        export ANDROID_HOME="$SDK"
        export ANDROID_SDK_ROOT="$SDK"
        export PATH="$PATH:$SDK/cmdline-tools/latest/bin:$SDK/platform-tools:$SDK/build-tools/34.0.0"
        echo "ANDROID_HOME=$ANDROID_HOME"

        # Write local.properties (in case phase boundary cleared it)
        cd "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR"
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        export KEYSTORE_FILE="$(pwd)/app/opusaimobility-driver.jks"

        echo "--- Gradle assembleDebug (--rerun-tasks) ---"
        ./gradlew assembleDebug \
          "-PGOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY:-}" \
          --no-daemon \
          --rerun-tasks \
          --stacktrace 2>&1
        GRADLE_EXIT=$?
        echo "Gradle debug exit: $GRADLE_EXIT"
        find . -name "*.apk" 2>/dev/null || echo "No APK files"

  post_build:
    commands:
      - echo POST_BUILD_START
      - ls "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/" 2>&1 || true
      - find "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build" -name "*.apk" 2>&1 || true
      - test -f "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/outputs/apk/debug/app-debug.apk" && aws s3 cp "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/outputs/apk/debug/app-debug.apk" "s3://$S3_APK_BUCKET/driver/debug/aimobility-driver-debug-latest.apk" --region us-east-1 && echo APK_UPLOADED || echo APK_NOT_FOUND
      - echo POST_BUILD_END

artifacts:
  files:
    - "**/*"
  base-directory: "MobilityAIapp/android/driver/app/build/outputs"
  discard-paths: no
  name: driver-apk-artifacts

cache:
  paths:
    - /root/.gradle/caches/**/*
    - /root/.gradle/wrapper/**/*
    - MobilityAIapp/android/driver/.gradle/**/*
