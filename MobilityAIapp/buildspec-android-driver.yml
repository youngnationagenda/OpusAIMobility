# ==============================================================================
# OpusAIMobility — Android Driver App Build Spec  (v2 - fix PKCS12 keystore)
#
# Builds com.opusaimobility.driver from android/driver/
# Uploads APK to: s3://opusaimobility-apk-distribution/driver/
#
# FIX v2:
#   The keystore stored in Secrets Manager is PKCS12 format (JDK 17 default).
#   Corretto 17 on Amazon Linux 2023 fails to read PKCS12 private keys during
#   Gradle's PackageAndroidArtifact signing step with:
#     "Given final block not properly padded"
#   Fix: convert PKCS12 → JKS using keytool immediately after decoding.
#   JKS is the legacy format fully supported by Android Gradle Plugin 8.x.
#
# Env vars injected by CodeBuild project (Secrets Manager):
#   KEYSTORE_PASSWORD  <- opusaimobility/android-keystore:storePassword
#   KEY_ALIAS          <- opusaimobility/android-keystore:keyAlias
#   KEY_PASSWORD       <- opusaimobility/android-keystore:keyPassword
#   GOOGLE_MAPS_KEY    <- terraai/google-maps:GOOGLE_MAPS_KEY
# ==============================================================================
version: 0.2

env:
  variables:
    DRIVER_APP_DIR: "MobilityAIapp/android/driver"
    S3_APK_BUCKET:  "opusaimobility-apk-distribution"
  secrets-manager:
    KEYSTORE_PASSWORD: "opusaimobility/android-keystore:storePassword"
    KEY_ALIAS:         "opusaimobility/android-keystore:keyAlias"
    KEY_PASSWORD:      "opusaimobility/android-keystore:keyPassword"
    GOOGLE_MAPS_KEY:   "terraai/google-maps:GOOGLE_MAPS_KEY"

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 22
    commands:
      - echo "=== Driver App Install Phase ==="
      - java -version
      - node --version

      # -- Android SDK ----------------------------------------------------------
      - |
        if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
          SDK="$ANDROID_HOME"
          echo "Using pre-installed SDK at ANDROID_HOME: $SDK"
        elif [ -d "/usr/local/android-sdk" ]; then
          SDK="/usr/local/android-sdk"
          echo "Using SDK at /usr/local/android-sdk"
        elif [ -d "$HOME/android-sdk" ]; then
          SDK="$HOME/android-sdk"
          echo "Using SDK at HOME: $SDK"
        else
          echo "Installing Android SDK command-line tools..."
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O clt.zip
          unzip -q clt.zip -d /tmp/clt_extract
          mv /tmp/clt_extract/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          SDK="$HOME/android-sdk"
          export PATH="$PATH:$SDK/cmdline-tools/latest/bin"
          cd "$CODEBUILD_SRC_DIR"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -5 || true
          echo "Android SDK installed at: $SDK"
        fi
        echo "$SDK" > /tmp/android-sdk-path.txt
        export ANDROID_HOME="$SDK"
        export ANDROID_SDK_ROOT="$SDK"
        export PATH="$PATH:$SDK/cmdline-tools/latest/bin:$SDK/platform-tools:$SDK/build-tools/34.0.0"
        echo "sdk.dir=$SDK" > "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/local.properties"
        echo "ANDROID_HOME=$ANDROID_HOME"

      # -- Decode keystore from Secrets Manager + convert PKCS12 → JKS ----------
      # WHY: Corretto 17 on Amazon Linux 2023 fails to read PKCS12 private keys
      # during AGP signing (AES-256-CBC padding mismatch). Converting to JKS
      # (legacy Sun keystore format) resolves the issue completely.
      - echo "=== Decoding and converting driver keystore ==="
      - |
        aws secretsmanager get-secret-value \
          --secret-id "opusaimobility/android-keystore" \
          --query "SecretString" --output text --region us-east-1 | \
        node -e "
          const raw = require('fs').readFileSync('/dev/stdin','utf8');
          const s = JSON.parse(raw);
          const dest = process.env.CODEBUILD_SRC_DIR + '/' + process.env.DRIVER_APP_DIR + '/app/opusaimobility-driver-pkcs12.jks';
          require('fs').writeFileSync(dest, Buffer.from(s.keystoreBase64, 'base64'));
          console.log('Driver keystore (PKCS12) decoded:', Buffer.from(s.keystoreBase64,'base64').length, 'bytes ->', dest);
        "

        # Convert PKCS12 → JKS so Gradle AGP can sign without padding errors
        PKCS12_KS="$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/opusaimobility-driver-pkcs12.jks"
        JKS_KS="$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/opusaimobility-driver.jks"

        keytool -importkeystore \
          -srckeystore  "$PKCS12_KS" \
          -destkeystore "$JKS_KS" \
          -deststoretype JKS \
          -srcstorepass  "$KEYSTORE_PASSWORD" \
          -deststorepass "$KEYSTORE_PASSWORD" \
          -srcalias  "$KEY_ALIAS" \
          -destalias "$KEY_ALIAS" \
          -srckeypass  "$KEYSTORE_PASSWORD" \
          -destkeypass "$KEY_PASSWORD" \
          -noprompt 2>&1 || echo "keytool conversion warning (non-fatal)"

        ls -la "$JKS_KS" && echo "JKS keystore ready" || echo "ERROR: JKS keystore not created"
        rm -f "$PKCS12_KS"

      # -- Inject Google Maps key into google-services.json ----------------------
      - echo "=== Patching google-services.json ==="
      - |
        node -e "
          const fs = require('fs');
          const p = process.env.CODEBUILD_SRC_DIR + '/' + process.env.DRIVER_APP_DIR + '/app/google-services.json';
          try {
            const gsj = JSON.parse(fs.readFileSync(p, 'utf8'));
            const key = process.env.GOOGLE_MAPS_KEY || '';
            if (gsj.client && gsj.client[0] && gsj.client[0].api_key) {
              gsj.client[0].api_key[0].current_key = key;
              fs.writeFileSync(p, JSON.stringify(gsj, null, 2));
              console.log('Driver google-services.json: Maps key patched (' + (key ? 'real key' : 'empty') + ')');
            }
          } catch(e) { console.warn('google-services.json patch skipped:', e.message); }
        "

      # -- gradlew permissions ---------------------------------------------------
      - chmod +x "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/gradlew"
      - echo "Install phase complete"

  build:
    commands:
      - echo "=== Driver App Build Phase ==="

      # Re-source SDK path (env vars do not persist across phases)
      - |
        SDK=$(cat /tmp/android-sdk-path.txt 2>/dev/null || echo "$HOME/android-sdk")
        export ANDROID_HOME="$SDK"
        export ANDROID_SDK_ROOT="$SDK"
        export PATH="$PATH:$SDK/cmdline-tools/latest/bin:$SDK/platform-tools:$SDK/build-tools/34.0.0"
        export GRADLE_USER_HOME="$HOME/.gradle"
        echo "ANDROID_HOME=$ANDROID_HOME"

        cd "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR"
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # Use the JKS keystore (PKCS12 causes padding errors on Corretto 17 + AGP 8.x)
        export KEYSTORE_FILE="$(pwd)/app/opusaimobility-driver.jks"
        echo "KEYSTORE_FILE=$KEYSTORE_FILE"
        ls -la "$KEYSTORE_FILE" && echo "JKS Keystore confirmed" || echo "WARNING: JKS Keystore missing"

        # -- Debug APK ----------------------------------------------------------
        echo "--- Building Driver debug APK ---"
        ./gradlew assembleDebug \
          "-PGOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY:-}" \
          --no-daemon \
          --no-build-cache \
          --rerun-tasks \
          --stacktrace \
          2>&1
        GRADLE_EXIT=$?
        echo "Gradle debug exit code: $GRADLE_EXIT"
        if [ $GRADLE_EXIT -ne 0 ]; then
          echo "ERROR: assembleDebug failed with exit $GRADLE_EXIT"
          exit $GRADLE_EXIT
        fi

        # -- Release APK --------------------------------------------------------
        if [ -f "$KEYSTORE_FILE" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
          echo "--- Building Driver release APK ---"
          ./gradlew assembleRelease \
            "-PGOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY:-}" \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            --stacktrace \
            2>&1
          RELEASE_EXIT=$?
          if [ $RELEASE_EXIT -ne 0 ]; then
            echo "WARNING: Release build failed (exit $RELEASE_EXIT) - continuing with debug only"
          else
            echo "Release build SUCCESS"
          fi
        else
          echo "Keystore not available - skipping release build"
        fi

        echo "--- APK outputs ---"
        find "$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/outputs" -name "*.apk" 2>/dev/null || echo "No APK files produced"

  post_build:
    commands:
      - echo "=== Driver App Post-Build ==="
      - BUILD_TS=$(date -u +%Y%m%d-%H%M%S)
      - COMMIT_SHORT=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)

      # -- Upload Debug APK -----------------------------------------------------
      - |
        DEBUG_APK="$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$DEBUG_APK" ]; then
          aws s3 cp "$DEBUG_APK" \
            "s3://$S3_APK_BUCKET/driver/debug/opusaimobility-driver-debug-${BUILD_TS}-${COMMIT_SHORT}.apk" \
            --region us-east-1
          aws s3 cp "$DEBUG_APK" \
            "s3://$S3_APK_BUCKET/driver/debug/opusaimobility-driver-debug-latest.apk" \
            --region us-east-1
          echo "APK_UPLOADED: s3://$S3_APK_BUCKET/driver/debug/opusaimobility-driver-debug-latest.apk"
        else
          echo "APK_NOT_FOUND: $DEBUG_APK"
          exit 1
        fi

      # -- Upload Release APK (if built) ----------------------------------------
      - |
        RELEASE_APK="$CODEBUILD_SRC_DIR/$DRIVER_APP_DIR/app/build/outputs/apk/release/app-release.apk"
        if [ -f "$RELEASE_APK" ]; then
          aws s3 cp "$RELEASE_APK" \
            "s3://$S3_APK_BUCKET/driver/release/opusaimobility-driver-release-${BUILD_TS}-${COMMIT_SHORT}.apk" \
            --region us-east-1
          aws s3 cp "$RELEASE_APK" \
            "s3://$S3_APK_BUCKET/driver/release/opusaimobility-driver-release-latest.apk" \
            --region us-east-1
          echo "RELEASE_APK_UPLOADED: s3://$S3_APK_BUCKET/driver/release/opusaimobility-driver-release-latest.apk"
        else
          echo "Release APK not built - skipping"
        fi

      - echo "Driver build complete - ${BUILD_TS}"

artifacts:
  files:
    - "**/*.apk"
  base-directory: "MobilityAIapp/android/driver/app/build/outputs"
  discard-paths: no
  name: driver-apk-artifacts

cache:
  paths:
    - /root/.gradle/wrapper/**/*
    - /root/.gradle/caches/**/*
    - MobilityAIapp/android/driver/.gradle/**/*
