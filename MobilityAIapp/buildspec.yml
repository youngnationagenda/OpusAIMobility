# ==============================================================================
# OpusAIMobility — Full Build Spec (lives inside MobilityAIapp/)
#
# IMPORTANT: This buildspec assumes CodeBuild checks out the REPO ROOT.
# $CODEBUILD_SRC_DIR will be the repo root (OpusAIMobility/).
# All paths use $CODEBUILD_SRC_DIR/MobilityAIapp/ as the app directory.
# ==============================================================================
version: 0.2

env:
  variables:
    NODE_ENV: production
    APP_DIR: "MobilityAIapp"
  secrets-manager:
    GEMINI_API_KEY: "opusaimobility/gemini-api-key:key"

phases:
  install:
    runtime-versions:
      nodejs: 22
      java: corretto17
    commands:
      - echo "=== Install Phase ==="
      - echo "CODEBUILD_SRC_DIR=$CODEBUILD_SRC_DIR"
      - echo "PWD=$(pwd)"
      - ls "$CODEBUILD_SRC_DIR/$APP_DIR/package.json" || { echo "ERROR - $APP_DIR not found at repo root"; ls -la "$CODEBUILD_SRC_DIR"; exit 1; }
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm ci --prefer-offline
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR/server" && npm ci --prefer-offline
      - echo "Node $(node -v) | npm $(npm -v)"

  pre_build:
    commands:
      - echo "=== Pre-Build Phase ==="
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm run type:check
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm test -- --silent
      - echo "--- Server pre-flight ---"
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && node -e "
          const fs = require('fs');
          const src = fs.readFileSync('server/server.js', 'utf8');
          const correct = /path\.join\(__dirname\s*,\s*['\"]\.\.['\"]\s*,\s*['\"]dist['\"]\)/.test(src);
          if (!correct) {
            console.error('FAIL: server/server.js staticPath does not point to ../dist');
            process.exit(1);
          }
          console.log('PASS: staticPath correctly set to ../dist');
        "

  build:
    commands:
      - echo "=== Build Phase ==="
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm run build
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm run server:check
      - echo "--- Lambda ZIP ---"
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR/backend/lambda/terraaimobility-api" && zip -r ../../../lambda-latest.zip .

  post_build:
    commands:
      - echo "=== Post-Build Deploy ==="
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && aws s3 sync dist/assets "s3://$S3_FRONTEND_BUCKET/assets/" --delete --cache-control "public, max-age=31536000, immutable" --region us-east-1
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && aws s3 cp dist/index.html "s3://$S3_FRONTEND_BUCKET/index.html" --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html" --region us-east-1
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && aws s3 sync dist "s3://$S3_FRONTEND_BUCKET/" --exclude "assets/*" --exclude "index.html" --cache-control "public, max-age=86400" --region us-east-1
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && aws lambda update-function-code --function-name "$LAMBDA_FUNCTION_NAME" --zip-file fileb://lambda-latest.zip --region us-east-1
      - aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*" --region us-east-1
      - echo "=== Deploy complete ==="

artifacts:
  files:
    - MobilityAIapp/lambda-latest.zip
    - MobilityAIapp/dist/**/*
  name: opusaimobility-build-$CODEBUILD_BUILD_NUMBER

cache:
  paths:
    - MobilityAIapp/node_modules/**/*
    - MobilityAIapp/server/node_modules/**/*
    - .gradle/caches/**/*
    - ~/.gradle/caches/**/*
