version: 0.2

env:
  variables:
    APP_DIR: "MobilityAIapp"
    S3_FRONTEND_BUCKET: "opusaimobility-assets-prod"
    CLOUDFRONT_DISTRIBUTION_ID: "E18GJ5VKHBIJAI"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - "cd $APP_DIR && npm ci --prefer-offline"
      - "cd $APP_DIR/server && npm ci --prefer-offline"

  pre_build:
    commands:
      - "cd $APP_DIR && npm run type:check"
      - "cd $APP_DIR && npm test -- --silent"
      - "cd $APP_DIR && node scripts/ci/check-static-path.cjs"

  build:
    commands:
      - "cd $APP_DIR && npm run build"
      - "cd $APP_DIR && npm run server:check"

  post_build:
    commands:
      - "cd $APP_DIR && aws s3 sync dist/assets s3://$S3_FRONTEND_BUCKET/assets/ --delete --cache-control 'public, max-age=31536000, immutable' --region us-east-1"
      - "cd $APP_DIR && aws s3 cp dist/index.html s3://$S3_FRONTEND_BUCKET/index.html --cache-control 'no-cache, no-store, must-revalidate' --content-type 'text/html' --region us-east-1"
      - "cd $APP_DIR && aws s3 sync dist s3://$S3_FRONTEND_BUCKET/ --exclude 'assets/*' --exclude 'index.html' --cache-control 'public, max-age=86400' --region us-east-1"
      - "aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths '/*' --region us-east-1"

artifacts:
  files:
    - "$APP_DIR/dist/**/*"
  discard-paths: no

cache:
  paths:
    - "$APP_DIR/node_modules/**/*"
    - "$APP_DIR/server/node_modules/**/*"
