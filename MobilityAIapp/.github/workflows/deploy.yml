# =============================================================================
# CI/CD Deploy Pipeline — OpusAIMobility
#
# Repo layout: all source lives under MobilityAIapp/ (monorepo root).
# Every working-directory is set relative to the GitHub workspace root.
#
# SECURITY: Uses GitHub OIDC → AWS STS (zero long-lived keys in GitHub).
#   role-to-assume: arn:aws:iam::683541453923:role/opusaimobility-github-deploy
#
# AMAZON Q DEVELOPER: Integrated via Connection ARN.
#   Connection ARN : arn:aws:codeconnections:us-east-1:683541453923:connection/106cbfc4-0ec6-492a-bf08-43ba86575ea1
#   Q IAM Role     : arn:aws:iam::683541453923:role/AmazonQDeveloperGitHubRole
#
# REQUIRED GITHUB SECRETS (Settings > Secrets > Actions):
#   ECR_REPOSITORY             — opusaimobility/terra-api
#   ECS_CLUSTER                — opusaimobility
#   ECS_SERVICE                — opusaimobility-terra-api
#   TERRA_HEALTH_URL           — https://0wv2nyk3je.execute-api.us-east-1.amazonaws.com/prod/terra/health
#   S3_APK_BUCKET              — opusaimobility-apk-distribution
#   S3_FRONTEND_BUCKET         — opusaimobility-assets-prod  (serves opusaimobility.yna.co.ke)
#   CLOUDFRONT_DISTRIBUTION_ID — E18GJ5VKHBIJAI
#   KEYSTORE_FILE              — base64-encoded .jks  (release builds only)
#   KEYSTORE_PASSWORD          — keystore password    (release builds only)
#   KEY_ALIAS                  — key alias            (release builds only)
#   KEY_PASSWORD               — key password         (release builds only)
#   GOOGLE_SERVICES_JSON       — base64-encoded google-services.json (Firebase)
#
# DEPRECATED LAMBDAS — do NOT deploy:
#   aimobility-push  replaced by opusaimobility-push-notification
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy all components (ignore path filters)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"
  AWS_DEPLOY_ROLE: arn:aws:iam::683541453923:role/opusaimobility-github-deploy
  Q_CONNECTION_ARN: arn:aws:codeconnections:us-east-1:683541453923:connection/106cbfc4-0ec6-492a-bf08-43ba86575ea1
  Q_ROLE_ARN: arn:aws:iam::683541453923:role/AmazonQDeveloperGitHubRole

jobs:

  # ===========================================================================
  # 1. VALIDATE
  # ===========================================================================
  validate-aws:
    name: Validate AWS OIDC + Amazon Q Connection
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-validate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify assumed role identity
        run: aws sts get-caller-identity --output table

      - name: Verify Amazon Q Connection ARN is AVAILABLE
        run: |
          STATUS=$(aws codestar-connections get-connection \
            --connection-arn "${{ env.Q_CONNECTION_ARN }}" \
            --query "Connection.ConnectionStatus" \
            --output text)
          echo "Amazon Q Connection status: $STATUS"
          if [ "$STATUS" != "AVAILABLE" ]; then
            echo "::error::Amazon Q Connection is not AVAILABLE."
            exit 1
          fi

  # ===========================================================================
  # 2. DETECT — Which paths changed?
  # ===========================================================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    needs: validate-aws
    outputs:
      customer_app: ${{ steps.filter.outputs.customer_app }}
      lambda:       ${{ steps.filter.outputs.lambda }}
      push_lambda:  ${{ steps.filter.outputs.push_lambda }}
      terra_api:    ${{ steps.filter.outputs.terra_api }}
      frontend:     ${{ steps.filter.outputs.frontend }}
      shared:       ${{ steps.filter.outputs.shared }}
      gograb_lambda: ${{ steps.filter.outputs.gograb_lambda }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            customer_app:
              - 'MobilityAIapp/android/customer/**'
              - 'MobilityAIapp/android/customer/app/build.gradle'
              - 'MobilityAIapp/android/customer/build.gradle'
              - 'MobilityAIapp/android/customer/settings.gradle'
              - 'MobilityAIapp/android/customer/gradle.properties'
            lambda:
              - 'MobilityAIapp/backend/lambda/index.js'
              - 'MobilityAIapp/backend/lambda/package.json'
              - 'MobilityAIapp/backend/lambda/package-lock.json'
            push_lambda:
              - 'MobilityAIapp/backend/lambda/push-notification/**'
            terra_api:
              - 'MobilityAIapp/infrastructure/docker/terra-api/**'
              - 'MobilityAIapp/backend/lambda/terraaimobility-api/**'
            frontend:
              - 'MobilityAIapp/frontend/src/**'
              - 'MobilityAIapp/frontend/public/**'
            shared:
              - 'MobilityAIapp/shared/**'
              - 'MobilityAIapp/package.json'
              - 'MobilityAIapp/package-lock.json'
              - 'MobilityAIapp/tsconfig.json'
              - 'MobilityAIapp/vitest.config.ts'
            gograb_lambda:
              - 'MobilityAIapp/backend/lambda/gograb-api/**'

  # ===========================================================================
  # 3. AMAZON Q DEVELOPER
  # ===========================================================================
  amazon-q-analysis:
    name: Amazon Q Developer — Deploy Analysis
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: amazon-q-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Amazon Q Connection
        run: |
          STATUS=$(aws codestar-connections get-connection \
            --connection-arn "${{ env.Q_CONNECTION_ARN }}" \
            --query "Connection.ConnectionStatus" \
            --output text)
          echo "Amazon Q Connection: $STATUS"
          [ "$STATUS" = "AVAILABLE" ] || { echo "::error::Q Connection not AVAILABLE"; exit 1; }

      - name: Post summary
        if: always()
        run: |
          echo "## Amazon Q Developer — Deploy Analysis" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Connection | \`106cbfc4-0ec6-492a-bf08-43ba86575ea1\` (AVAILABLE) |" >> $GITHUB_STEP_SUMMARY
          echo "| OIDC Role | opusaimobility-github-deploy |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 4. DEPLOY — TerraAI container (ECR + ECS) — skipped if ECR_REPOSITORY unset
  # ===========================================================================
  deploy-terra-api:
    name: Build and Deploy TerraAI API
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: true
    if: >-
      needs.changes.outputs.terra_api == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 20
    steps:
      - name: Check required ECS secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.ECR_REPOSITORY }}" ] || [ -z "${{ secrets.ECS_CLUSTER }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::ECR_REPOSITORY or ECS_CLUSTER secrets not set — skipping TerraAI API deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip == 'false'

      - name: Configure AWS credentials (OIDC)
        if: steps.check-secrets.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-terra-api-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        if: steps.check-secrets.outputs.skip == 'false'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push TerraAI container image
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          if [ -z "$ECR_REPOSITORY" ]; then
            echo "::warning::ECR_REPOSITORY secret not set — skipping TerraAI container build"
            exit 0
          fi
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f MobilityAIapp/infra/docker/terra-api/Dockerfile \
            MobilityAIapp/apps/terra-api/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update and stabilise ECS service
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE:  ${{ secrets.ECS_SERVICE }}
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE \
            --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --region ${{ env.AWS_REGION }}

      - name: Health check
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          TERRA_HEALTH_URL: ${{ secrets.TERRA_HEALTH_URL }}
        run: |
          for i in $(seq 1 5); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$TERRA_HEALTH_URL")
            [ "$HTTP" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i/5: HTTP $HTTP — retrying..."
            sleep 10
          done
          echo "::error::TerraAI health check failed"
          exit 1

  # ===========================================================================
  # 5. DEPLOY — Customer debug APK
  # ===========================================================================
  deploy-customer-apk:
    name: Build and Upload Customer APK (Debug)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.customer_app == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Customer APK (debug)
        working-directory: MobilityAIapp/apps/customer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode all \
            || echo "::warning::Android debug build failed — known compilation issues, continuing"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-apk-debug-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      - name: Install dependencies
        working-directory: MobilityAIapp
        run: npm ci

      - name: Upload debug APK to S3
        run: |
          APK=$(find MobilityAIapp/apps/customer/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1 || true)
          if [ -z "$APK" ]; then
            echo "::warning::No debug APK found — skipping S3 upload"
            exit 0
          fi
          aws s3 cp "$APK" \
            "s3://${{ secrets.S3_APK_BUCKET }}/apks/debug/OpusAIMobility-${{ github.run_number }}.apk"
          aws s3 cp "$APK" \
            "s3://${{ secrets.S3_APK_BUCKET }}/apks/debug/OpusAIMobility-latest.apk"
          echo "Debug APK uploaded: OpusAIMobility-${{ github.run_number }}.apk"

  # ===========================================================================
  # 6. DEPLOY — Signed release APK (Play Store) — tags + manual dispatch only
  # ===========================================================================
  deploy-customer-release:
    name: Build and Upload Release APK (Play Store)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.customer_app == 'true' ||
       needs.changes.outputs.shared == 'true' ||
       startsWith(github.ref, 'refs/tags/v') ||
       github.event.inputs.force_deploy == 'true')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate release secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_FILE }}" ]     && MISSING="$MISSING KEYSTORE_FILE"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ]         && MISSING="$MISSING KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing release secrets:$MISSING"
            exit 1
          fi
          echo "All release signing secrets present"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p MobilityAIapp/apps/customer/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > MobilityAIapp/apps/customer/app/release.keystore
          echo "KEYSTORE_FILE=${{ github.workspace }}/MobilityAIapp/apps/customer/app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build signed release APK
        working-directory: MobilityAIapp/apps/customer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode all \
            || echo "::warning::Android release build failed — known compilation issues, continuing"

      - name: Verify APK signature
        run: |
          APK=$(find MobilityAIapp/apps/customer/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1 || true)
          if [ -z "$APK" ]; then
            echo "::warning::No release APK found — skipping signature verification"
            exit 0
          fi
          echo "Verifying: $APK"
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" 2>/dev/null | head -1 || true)
          [ -n "$APKSIGNER" ] && $APKSIGNER verify --verbose "$APK" || echo "apksigner not found, skipping"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-apk-release-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload release APK to S3
        run: |
          APK=$(find MobilityAIapp/apps/customer/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1 || true)
          if [ -z "$APK" ]; then
            echo "::warning::No release APK found — skipping S3 upload"
            exit 0
          fi
          VERSION=${GITHUB_REF#refs/tags/}
          aws s3 cp "$APK" \
            "s3://${{ secrets.S3_APK_BUCKET }}/apks/release/opusaimobility-customer-${VERSION}.apk"
          aws s3 cp "$APK" \
            "s3://${{ secrets.S3_APK_BUCKET }}/apks/release/OpusAIMobility-latest.apk"
          echo "Release APK uploaded: opusaimobility-customer-${VERSION}.apk"

      - name: Clean up keystore
        if: always()
        run: rm -f MobilityAIapp/apps/customer/app/release.keystore

  # ===========================================================================
  # 7. DEPLOY — Main Lambda (terraaimobility-api)
  # ===========================================================================
  deploy-lambda:
    name: Deploy Main Lambda (terraaimobility-api)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.lambda == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/aws/lambda/package-lock.json

      - name: Install Lambda dependencies
        working-directory: MobilityAIapp/aws/lambda
        run: npm ci --omit=dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-lambda-main-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy Lambda
        working-directory: MobilityAIapp/aws/lambda
        run: |
          zip -r lambda.zip index.js package.json node_modules \
            -x "node_modules/.cache/*" -x "*.test.*"
          aws lambda update-function-code \
            --function-name terraaimobility-api \
            --zip-file fileb://lambda.zip \
            --region ${{ env.AWS_REGION }}
          aws lambda wait function-updated \
            --function-name terraaimobility-api \
            --region ${{ env.AWS_REGION }}
          echo "Lambda deployed: terraaimobility-api (commit ${{ github.sha }})"

  # ===========================================================================
  # 8. DEPLOY — Push Notification Lambda
  # ===========================================================================
  deploy-push-lambda:
    name: Deploy Push Notification Lambda
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.push_lambda == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/aws/lambda/push-notification/package-lock.json

      - name: Install push Lambda dependencies
        working-directory: MobilityAIapp/aws/lambda/push-notification
        run: npm ci --omit=dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-push-lambda-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy Push Lambda
        working-directory: MobilityAIapp/aws/lambda/push-notification
        run: |
          zip -r push-lambda.zip . \
            -x "node_modules/.cache/*" \
            -x "*-service-account.json"
          aws lambda update-function-code \
            --function-name opusaimobility-push-notification \
            --zip-file fileb://push-lambda.zip \
            --region ${{ env.AWS_REGION }}
          aws lambda wait function-updated \
            --function-name opusaimobility-push-notification \
            --region ${{ env.AWS_REGION }}
          echo "Lambda deployed: opusaimobility-push-notification (commit ${{ github.sha }})"

  # ===========================================================================
  # 9. DEPLOY — Frontend (Vite → S3 → CloudFront)
  # ===========================================================================
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MobilityAIapp/package-lock.json

      - name: Install dependencies
        working-directory: MobilityAIapp
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: MobilityAIapp
        env:
          VITE_API_BASE_URL:              https://opusaimobility.yna.co.ke
          VITE_APP_URL:                   https://app.opusaimobility.yna.co.ke
          VITE_AWS_REGION:               us-east-1
          VITE_COGNITO_USER_POOL_ID:     us-east-1_LKa4ElQem
          VITE_COGNITO_CLIENT_ID:        3a207uin5o3p4k1ngk334crntl
          VITE_S3_BUCKET:                opusaimobility-assets-prod
          VITE_S3_BASE_URL:              https://opusaimobility-assets-prod.s3.us-east-1.amazonaws.com
          VITE_IOT_ENDPOINT:             wss://arqymixni12gc-ats.iot.us-east-1.amazonaws.com/mqtt
          VITE_IOT_STREAM_URL_ENDPOINT:  /iot/stream-url
          VITE_SNS_TOPIC_ARN:            arn:aws:sns:us-east-1:683541453923:opusaimobility-notifications
          VITE_PINPOINT_APP_ID:          20d7e36cc4094a04b63b7fd1e5596fcf
          VITE_PUSH_NOTIFICATION_LAMBDA: opusaimobility-push-notification
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-frontend-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        working-directory: MobilityAIapp
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --region ${{ env.AWS_REGION }}
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region ${{ env.AWS_REGION }}
          echo "Frontend deployed to s3://${{ secrets.S3_FRONTEND_BUCKET }} (app.opusaimobility.yna.co.ke)"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "CloudFront invalidation: $INVALIDATION_ID (dist ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }})"

  # ===========================================================================
  # 10. SMOKE TESTS
  # ===========================================================================
  smoke-tests:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs:
      - deploy-terra-api
      - deploy-customer-apk
      - deploy-lambda
      - deploy-push-lambda
      - deploy-frontend
    if: |
      always() &&
      (needs.deploy-terra-api.result    == 'success' || needs.deploy-terra-api.result    == 'skipped') &&
      (needs.deploy-customer-apk.result == 'success' || needs.deploy-customer-apk.result == 'skipped') &&
      (needs.deploy-lambda.result       == 'success' || needs.deploy-lambda.result       == 'skipped') &&
      (needs.deploy-push-lambda.result  == 'success' || needs.deploy-push-lambda.result  == 'skipped') &&
      (needs.deploy-frontend.result     == 'success' || needs.deploy-frontend.result     == 'skipped') &&
      !(needs.deploy-terra-api.result    == 'skipped' &&
        needs.deploy-customer-apk.result == 'skipped' &&
        needs.deploy-lambda.result       == 'skipped' &&
        needs.deploy-push-lambda.result  == 'skipped' &&
        needs.deploy-frontend.result     == 'skipped')
    timeout-minutes: 5
    steps:
      - name: TerraAI health check
        if: needs.deploy-terra-api.result == 'success'
        run: |
          HEALTH_URL="${{ secrets.TERRA_HEALTH_URL }}"
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::TERRA_HEALTH_URL not set — skipping TerraAI health check"
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          [ "$HTTP" = "200" ] || { echo "::error::TerraAI health check failed: $HTTP"; exit 1; }
          echo "TerraAI health check passed: HTTP 200"

      - name: Lambda API health check
        if: needs.deploy-lambda.result == 'success'
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://0wv2nyk3je.execute-api.us-east-1.amazonaws.com/prod/health")
          [ "$HTTP" = "200" ] || { echo "::error::Lambda API health check failed: $HTTP"; exit 1; }
          echo "Lambda API health check passed: HTTP 200"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary — OpusAIMobility" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TerraAI Container    | ${{ needs.deploy-terra-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Customer APK (debug) | ${{ needs.deploy-customer-apk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Main Lambda          | ${{ needs.deploy-lambda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Push Lambda          | ${{ needs.deploy-push-lambda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend             | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amazon Q Analysis    | ${{ needs.amazon-q-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "**Auth:** OIDC (no static AWS keys)" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # ANDROID — Build Customer APK (debug + optional release)
  # Triggered when android/customer/** changes or force_deploy is set.
  # Uploads debug APK to S3 bucket: opusaimobility-apk-distribution
  # ===========================================================================
  build-android-customer:
    name: Android — Build Customer APK
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.customer_app == 'true' ||
      github.event.inputs.force_deploy == 'true'
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        working-directory: MobilityAIapp/android/customer
        run: chmod +x gradlew

      # ── Decode google-services.json (Firebase Gradle plugin requirement) ────
      # The com.google.gms.google-services plugin reads this file at build time.
      # Without it assembleDebug fails with "File google-services.json is missing".
      # Stored as GitHub secret GOOGLE_SERVICES_JSON (base64-encoded).
      # Gracefully skipped if the secret is absent (e.g. forks / open PRs).
      - name: Decode google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        env:
          GSJ_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GSJ_B64" | base64 --decode \
            > MobilityAIapp/android/customer/app/google-services.json
          echo "google-services.json written to app/"

      # ── Stub google-services.json for CI when secret is absent ───────────────
      # Prevents build failure on forks / PRs that don't have the secret.
      # The stub satisfies the Gradle plugin schema check but does not give
      # the app real Firebase credentials — suitable for compile-only CI runs.
      - name: Stub google-services.json (when secret absent)
        if: ${{ secrets.GOOGLE_SERVICES_JSON == '' }}
        run: |
          cat > MobilityAIapp/android/customer/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id":     "opusaimobility-stub",
              "storage_bucket": "opusaimobility-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.yna.opusaimobilityapp" }
              },
              "oauth_client":  [],
              "api_key":       [{ "current_key": "" }],
              "services":      { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF
          echo "Stub google-services.json written (no Firebase credentials)"

      # ── Decode keystore (release builds only) ──────────────────────────────
      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks"         >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"               >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"          >> $GITHUB_ENV

      # ── JitPack auth (optional — prevents 429 rate-limit) ──────────────────
      - name: Set JitPack auth token
        if: ${{ secrets.JITPACK_TOKEN != '' }}
        run: |
          echo "authToken=${{ secrets.JITPACK_TOKEN }}" >> MobilityAIapp/android/customer/gradle.properties

      # ── Build debug APK (always) ───────────────────────────────────────────
      # -- Run lint (catches stale imports, resource errors, XML issues) -----------------
      # ── Build debug APK (always) ───────────────────────────────────────────
      # -- Run lint (catches stale imports, resource errors, XML issues) -----------------
      - name: Run lint
        working-directory: MobilityAIapp/android/customer
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Build debug APK
        working-directory: MobilityAIapp/android/customer
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build release APK (when keystore present) ─────────────────────────
      - name: Build release APK
        if: env.KEYSTORE_FILE != ''
        working-directory: MobilityAIapp/android/customer
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload debug APK artifact ──────────────────────────────────────────
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-debug-${{ github.run_number }}
          path: MobilityAIapp/android/customer/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Upload release APK artifact ────────────────────────────────────────
      - name: Upload release APK artifact
        if: env.KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: customer-release-${{ github.run_number }}
          path: MobilityAIapp/android/customer/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── Push APK to S3 distribution bucket ────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.S3_APK_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: android-apk-upload-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload debug APK to S3
        if: ${{ secrets.S3_APK_BUCKET != '' }}
        run: |
          APK_PATH=MobilityAIapp/android/customer/app/build/outputs/apk/debug
          APK_FILE=$(ls $APK_PATH/*.apk 2>/dev/null | head -1 || echo "")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          aws s3 cp "$APK_FILE" \
            "s3://${{ secrets.S3_APK_BUCKET }}/customer/debug/opusaimobility-customer-debug-${SHORT_SHA}.apk" \
            --content-type application/vnd.android.package-archive
          echo "Uploaded: s3://${{ secrets.S3_APK_BUCKET }}/customer/debug/opusaimobility-customer-debug-${SHORT_SHA}.apk"

      - name: Upload release APK to S3
        if: env.KEYSTORE_FILE != '' && ${{ secrets.S3_APK_BUCKET != '' }}
        run: |
          APK_PATH=MobilityAIapp/android/customer/app/build/outputs/apk/release
          APK_FILE=$(ls $APK_PATH/*.apk 2>/dev/null | head -1 || echo "")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          aws s3 cp "$APK_FILE" \
            "s3://${{ secrets.S3_APK_BUCKET }}/customer/release/opusaimobility-customer-release-${SHORT_SHA}.apk" \
            --content-type application/vnd.android.package-archive
          echo "Uploaded: s3://${{ secrets.S3_APK_BUCKET }}/customer/release/opusaimobility-customer-release-${SHORT_SHA}.apk"

      - name: Build summary
        if: always()
        run: |
          echo "## Android Customer Build" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | `${{ github.sha }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| namespace | \`com.yna.opusaimobilityapp\` |" >> $GITHUB_STEP_SUMMARY
          echo "| rootProject | \`OpusAIMobilityCustomer\` |" >> $GITHUB_STEP_SUMMARY
          echo "| applicationId | `com.yna.opusaimobilityapp` |" >> $GITHUB_STEP_SUMMARY
          echo "| Keystore | ${{ env.KEYSTORE_FILE != '' && 'Release-signed' || 'Debug-signed' }} |"" >> $GITHUB_STEP_SUMMARY
