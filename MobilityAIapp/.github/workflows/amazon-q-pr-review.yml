# =============================================================================
# Amazon Q Developer — Automated PR Code Review
#
# Triggers on every pull-request to main/develop.
# Authenticates to AWS via GitHub OIDC, verifies the Amazon Q Connection ARN
# is AVAILABLE, then posts a comment on the PR so reviewers can invoke Q.
#
# Amazon Q Developer CI/CD integration works via the Connection ARN configured
# in AWS Console (CodeConnections) — Q monitors the repo automatically once
# the connection is established. Reviewers invoke Q by commenting @amazon-q.
#
# AWS resources:
#   OIDC role     : arn:aws:iam::683541453923:role/opusaimobility-github-deploy
#   Connection ARN: arn:aws:codeconnections:us-east-1:683541453923:connection/106cbfc4-0ec6-492a-bf08-43ba86575ea1
#   Q IAM Role    : arn:aws:iam::683541453923:role/AmazonQDeveloperGitHubRole
#
# Requirements: 11.3
# =============================================================================

name: Amazon Q Developer — PR Review

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: amazon-q-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write       # GitHub OIDC token → AWS STS
  contents: read
  pull-requests: write  # Post review comment on PR

env:
  AWS_REGION: us-east-1
  Q_CONNECTION_ARN: arn:aws:codeconnections:us-east-1:683541453923:connection/106cbfc4-0ec6-492a-bf08-43ba86575ea1

jobs:
  amazon-q-review:
    name: Amazon Q Developer — Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── 2. Authenticate to AWS via OIDC (no long-lived keys) ────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::683541453923:role/opusaimobility-github-deploy
          role-session-name: amazon-q-pr-${{ github.event.pull_request.number }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Verify assumed identity ───────────────────────────────────────────
      - name: Verify assumed role identity
        run: |
          echo "=== AWS Caller Identity (OIDC) ==="
          aws sts get-caller-identity --output table

      # ── 4. Verify Amazon Q Connection ARN is AVAILABLE ───────────────────────
      - name: Verify Amazon Q Connection ARN
        run: |
          STATUS=$(aws codestar-connections get-connection \
            --connection-arn "${{ env.Q_CONNECTION_ARN }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Connection.ConnectionStatus" \
            --output text)
          echo "Amazon Q Connection status: $STATUS"
          if [ "$STATUS" != "AVAILABLE" ]; then
            echo "::error::Amazon Q Connection is not AVAILABLE (status: $STATUS)"
            echo "Re-authorize at: https://console.aws.amazon.com/codesuite/settings/connections"
            exit 1
          fi
          echo "Amazon Q Developer Connection is AVAILABLE"

      # ── 5. Post Amazon Q invocation comment on the PR ────────────────────────
      - name: Post Amazon Q Developer — PR Review Comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT="### 🤖 Amazon Q Developer — Ready to Review

          Amazon Q Developer is connected to this repository and ready to review PR #${{ github.event.pull_request.number }}.

          **Invoke an automated code review:**
          \`\`\`
          @amazon-q review
          \`\`\`

          **Ask Q about specific code:**
          \`\`\`
          @amazon-q explain the changes in src/services/
          \`\`\`

          **Request a security scan:**
          \`\`\`
          @amazon-q are there any security issues in this PR?
          \`\`\`

          ---
          > 🔗 Connection: \`106cbfc4-0ec6-492a-bf08-43ba86575ea1\` (AVAILABLE)
          > 🔐 Auth: GitHub OIDC → \`opusaimobility-github-deploy\` (no static keys)
          > 🛡️ Q Role: \`AmazonQDeveloperGitHubRole\`"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT" || echo "Comment post skipped (may already exist)"

      # ── 6. Post summary ──────────────────────────────────────────────────────
      - name: Post Q Review Summary
        if: always()
        run: |
          echo "## Amazon Q Developer — PR Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field        | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR           | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository   | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base         | ${{ github.base_ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Head         | ${{ github.head_ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connection   | \`106cbfc4-0ec6-492a-bf08-43ba86575ea1\` (AVAILABLE) |" >> $GITHUB_STEP_SUMMARY
          echo "| Q Invoke     | Comment \`@amazon-q review\` on this PR |" >> $GITHUB_STEP_SUMMARY
