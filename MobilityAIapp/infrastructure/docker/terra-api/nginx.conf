# Nginx configuration for TerraAI PHP-FPM upstream
# Validates: Requirements 3.1, 3.2, 3.6

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured JSON log format for CloudWatch ingestion (Requirement 12.1)
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # File upload size limit (50 MB per Requirement 9.2)
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Hide server version
    server_tokens off;

    # PHP-FPM upstream
    upstream php-fpm {
        server 127.0.0.1:9000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html;
        index index.php;

        # Health check endpoint (Requirement 3.6)
        # Returns 200 when PHP-FPM is responding
        location = /health {
            access_log off;
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $document_root/health.php;
            include fastcgi_params;
            fastcgi_read_timeout 5s;
        }

        # PHP file handling
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 30s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;

            # Pass request ID for tracing (X-Ray)
            fastcgi_param HTTP_X_REQUEST_ID $request_id;
        }

        # Default route — pass all requests to index.php (front controller)
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # Deny access to hidden files (security)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to composer files and vendor internals
        location ~ ^/(vendor|composer\.(json|lock)) {
            deny all;
        }

        # Static file caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
    }
}
