# ==============================================================================
# OpusAIMobility - AWS CodeBuild Build Specification
# Builds: Android APK, Frontend (React/Vite), Lambda packages
# Runtime: Amazon Linux 2023 (AL2023)
# ==============================================================================
version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    NODE_VERSION: "20"
    JAVA_VERSION: "17"

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
    commands:
      - echo "=== Install Phase ==="
      - java -version
      - node --version
      - npm --version
      # Install Android SDK
      - export ANDROID_HOME=/opt/android-sdk
      - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
      - mkdir -p $ANDROID_HOME/cmdline-tools
      - cd /tmp && curl -sS -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
      - unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
      - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
      - yes | sdkmanager --licenses > /dev/null 2>&1 || true
      - sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null
      - cd $CODEBUILD_SRC_DIR

  pre_build:
    commands:
      - echo "=== Pre-Build Phase ==="
      - export ANDROID_HOME=/opt/android-sdk
      - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
      # Frontend dependencies
      - cd MobilityAIapp && npm ci
      - cd ..
      # Lambda v3.1 dependencies (terraaimobility-api)
      - cd MobilityAIapp/aws/lambda/terraaimobility-api && npm ci --omit=dev
      - cd ../../../..
      # Android setup
      - chmod +x MobilityAIapp/apps/customer/gradlew
      - echo "Pre-build complete"

  build:
    commands:
      - echo "=== Build Phase ==="
      - export ANDROID_HOME=/opt/android-sdk
      - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
      # Build Frontend
      - echo "Building Frontend..."
      - cd MobilityAIapp && npm run build
      - cd ..
      # Build Android APK (non-blocking)
      - echo "Building Android APK..."
      - cd MobilityAIapp/apps/customer
      - ./gradlew assembleDebug --no-daemon --warning-mode all || echo "WARNING - Android build failed (known dependency issues)"
      - cd ../../..
      # Package Lambda v3.1 (terraaimobility-api only — excludes _*.js scratch files)
      - echo "Packaging Lambda v3.1..."
      - cd MobilityAIapp/aws/lambda/terraaimobility-api
      - zip -r ../lambda-main.zip index.js auth.js db.js notify.js seed-config.js package.json node_modules
      - cd ../../../..
      - echo "Lambda packaged"

  post_build:
    commands:
      - echo "=== Post-Build Phase ==="
      # Deploy Frontend to S3
      - |
        if [ -n "$S3_FRONTEND_BUCKET" ]; then
          aws s3 sync MobilityAIapp/dist/ s3://$S3_FRONTEND_BUCKET/ --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp MobilityAIapp/dist/index.html s3://$S3_FRONTEND_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "Frontend deployed to s3://$S3_FRONTEND_BUCKET"
        fi
      # Invalidate CloudFront
      - |
        if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
          echo "CloudFront invalidation triggered: $CLOUDFRONT_DISTRIBUTION_ID"
        fi
      # Deploy Lambda v3.1
      - |
        if [ -n "$LAMBDA_FUNCTION_NAME" ]; then
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --zip-file fileb://MobilityAIapp/aws/lambda/lambda-main.zip \
            --region $AWS_REGION
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION_NAME \
            --region $AWS_REGION
          echo "Lambda deployed: $LAMBDA_FUNCTION_NAME"
        fi
      # Upload APK to S3
      - |
        if [ -n "$S3_APK_BUCKET" ]; then
          APK=$(find MobilityAIapp/apps/customer/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1 || true)
          if [ -n "$APK" ]; then
            VERSION="${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}"
            aws s3 cp "$APK" "s3://$S3_APK_BUCKET/apks/OpusAIMobility-${VERSION}.apk"
            aws s3 cp "$APK" "s3://$S3_APK_BUCKET/apks/OpusAIMobility-latest.apk"
            echo "APK uploaded: OpusAIMobility-${VERSION}.apk"
          else
            echo "No APK found — skipping"
          fi
        fi
      - echo "Post-build complete"

artifacts:
  files:
    - MobilityAIapp/dist/**/*
    - MobilityAIapp/apps/customer/app/build/outputs/apk/**/*.apk
    - MobilityAIapp/aws/lambda/lambda-main.zip
  discard-paths: no
  secondary-artifacts:
    frontend:
      base-directory: MobilityAIapp/dist
      files:
        - "**/*"
    android-apk:
      base-directory: MobilityAIapp/apps/customer/app/build/outputs/apk
      files:
        - "**/*.apk"
    lambda-packages:
      files:
        - MobilityAIapp/aws/lambda/lambda-main.zip
      discard-paths: yes

cache:
  paths:
    - "/root/.npm/**/*"
    - "/root/.gradle/caches/**/*"
    - "/root/.gradle/wrapper/**/*"
    - "MobilityAIapp/node_modules/**/*"
    - "MobilityAIapp/aws/lambda/terraaimobility-api/node_modules/**/*"
