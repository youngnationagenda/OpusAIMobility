# ==============================================================================
# OpusAIMobility — Frontend-Only Build Specification (repo root)
#
# Source: MobilityAIapp/src/ (Vite root)
# Output: MobilityAIapp/dist/ (deployed to S3/CloudFront)
#
# $CODEBUILD_SRC_DIR is the repo root. APP_DIR=MobilityAIapp.
# ==============================================================================
version: 0.2

env:
  variables:
    APP_DIR: "MobilityAIapp"
    S3_FRONTEND_BUCKET: "opusaimobility-assets-prod"
    CLOUDFRONT_DISTRIBUTION_ID: "E18GJ5VKHBIJAI"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Install Phase ==="
      - node --version
      - npm --version

  pre_build:
    commands:
      - echo "=== Pre-Build Phase ==="
      - echo "CODEBUILD_SRC_DIR=$CODEBUILD_SRC_DIR"
      - ls -la "$CODEBUILD_SRC_DIR/$APP_DIR/package.json" || { echo "ERROR - $APP_DIR not found"; ls -la "$CODEBUILD_SRC_DIR"; exit 1; }
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm ci
      - echo "Dependencies installed ($(ls node_modules | wc -l) packages)"

  build:
    commands:
      - echo "=== Build Phase ==="
      - cd "$CODEBUILD_SRC_DIR/$APP_DIR" && npm run build
      - echo "Build output:"
      - ls -la "$CODEBUILD_SRC_DIR/$APP_DIR/dist/"
      - echo "Total files: $(find $CODEBUILD_SRC_DIR/$APP_DIR/dist -type f | wc -l)"

  post_build:
    commands:
      - echo "=== Post-Build Phase ==="
      - |
        if [ -n "$S3_FRONTEND_BUCKET" ]; then
          echo "Deploying to s3://$S3_FRONTEND_BUCKET ..."
          aws s3 sync "$CODEBUILD_SRC_DIR/$APP_DIR/dist/" "s3://$S3_FRONTEND_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp "$CODEBUILD_SRC_DIR/$APP_DIR/dist/index.html" "s3://$S3_FRONTEND_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "Frontend deployed to S3"
        else
          echo "SKIPPED - S3_FRONTEND_BUCKET not set"
        fi
      - |
        if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
          echo "CloudFront cache invalidated"
        else
          echo "SKIPPED - CLOUDFRONT_DISTRIBUTION_ID not set"
        fi
      - echo "=== Deployment Complete ==="

artifacts:
  base-directory: MobilityAIapp/dist
  files:
    - "**/*"
  name: frontend-$CODEBUILD_BUILD_NUMBER

cache:
  paths:
    - "MobilityAIapp/node_modules/**/*"
